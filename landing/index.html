    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* ── Marquee ── */
    @keyframes marquee-left {
      from { transform: translateX(0); }
      to   { transform: translateX(-25%); }
    }
    .marquee-track {
      display: flex;
      width: max-content;
      animation: marquee-left 28s linear infinite;
    }
    .marquee-track:hover { animation-play-state: paused; }

    /* ── Scroll ring ── */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Counter ── */
    @keyframes count-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Fade in ── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fade-up 0.7s ease forwards; }
    .fade-up-1 { animation-delay: 0.1s; opacity: 0; }
    .fade-up-2 { animation-delay: 0.25s; opacity: 0; }
    .fade-up-3 { animation-delay: 0.4s; opacity: 0; }

const { useState, useEffect, useRef } = React;

/* ── Tweaks defaults ── */

  "ctaText": "Únete al Equipo"
} /*EDITMODE-END*/;

/* ── Animated counter ── */
function useCounter(target, duration = 1800) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (!entry.isIntersecting) return;
      observer.disconnect();
      let start = null;
      const step = (ts) => {
        if (!start) start = ts;
        const p = Math.min((ts - start) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        setVal(Math.floor(ease * target));
        if (p < 1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    }, { threshold: 0.3 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [target, duration]);
  return [val, ref];
}

/* ── Nav ── */
function Nav({ primary, secondary, bg }) {
  const [scrolled, setScrolled] = useState(false);
  const [isDark, setIsDark] = useState(() => {
    return document.documentElement.getAttribute('data-theme') === 'dark';
  });

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  const toggleTheme = () => {
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('dt_theme', next);
    setIsDark(!isDark);
  };

  const links = [
    { label: 'Inicio', href: '#inicio' },
    { label: 'Sobre Nosotros', href: '#sobre-nosotros' },
    { label: 'Proceso', href: '#como-trabajamos' },
    { label: 'Únete al Equipo', href: '#unete' },
  ];

  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: scrolled ? 'var(--bg-navbar)' : 'transparent',
      backdropFilter: scrolled ? 'blur(16px)' : 'none',
      borderBottom: scrolled ? '1px solid var(--border-color)' : 'none',
      transition: 'all 0.35s ease'
    }}>
      <div style={{
        maxWidth: 1280, margin: '0 auto', width: '100%',
        padding: scrolled ? '10px 40px' : '18px 40px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between'
      }}>
      {/* Logo */}
      <div style={{ display: 'flex', alignItems: 'center' }}>
        <img src={(window.__resources && window.__resources.logoImg || "images/logoImg_nuevo.png") + "?v=3"} alt="DreamTeam" style={{ height: 75, width: 'auto', objectFit: 'contain', display: 'block' }} />
      </div>

      {/* Links */}
      <div style={{
          display: 'flex', gap: 2, alignItems: 'center',
          background: 'var(--glass-bg)',
          backdropFilter: 'blur(12px)',
          borderRadius: 100,
          padding: '5px 6px',
          border: '1px solid var(--glass-border)',
          boxShadow: '0 2px 12px rgba(0,0,0,0.06)', fontSize: "14px"
        }}>
        {links.map((l) =>
          <a key={l.label} href={l.href} style={{
            fontFamily: 'DM Sans', fontWeight: 500,
            color: 'var(--text-main)', textDecoration: 'none', opacity: 0.85,
            padding: '5px 15px', borderRadius: 100,
            transition: 'opacity 0.2s, background 0.15s', fontSize: "14px"
          }}
          onMouseEnter={(e) => {e.currentTarget.style.opacity = 1;e.currentTarget.style.background = 'rgba(0,0,0,0.05)';}}
          onMouseLeave={(e) => {e.currentTarget.style.opacity = 0.85;e.currentTarget.style.background = 'transparent';}}>
            {l.label}
          </a>
          )}
      </div>

      {/* CTA & Theme Switch */}
      <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        <div onClick={toggleTheme} style={{
          background: 'none', border: '1px solid var(--border-color)',
          width: '38px', height: '38px', borderRadius: '50%',
          cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: 'var(--text-main)', transition: 'all 0.2s ease'
        }} onMouseEnter={(e) => {e.currentTarget.style.background = 'var(--border-color)';}}
           onMouseLeave={(e) => {e.currentTarget.style.background = 'none';}}
           aria-label="Alternar Tema">
          {isDark ? (
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ display: 'block' }}>
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          ) : (
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ display: 'block' }}>
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          )}
        </div>

        <button style={{
            background: primary, color: 'white', border: 'none',
            borderRadius: 100, padding: '9px 22px',
            fontWeight: 600, cursor: 'pointer', fontFamily: 'DM Sans',
            transition: 'transform 0.2s, box-shadow 0.2s',
            boxShadow: `0 4px 16px ${primary}55`, fontSize: "14px"
          }}
          onMouseEnter={(e) => {e.target.style.transform = 'scale(1.04)';e.target.style.boxShadow = `0 6px 24px ${primary}77`;}}
          onMouseLeave={(e) => {e.target.style.transform = 'scale(1)';e.target.style.boxShadow = `0 4px 16px ${primary}55`;}} id="colaboradores-btn">Colaboradores
        </button>
      </div>
      </div>
    </nav>);
}

  { rotate: -8, x: -5, y: 10, bg: primary, opacity: 0.22 },

  return (
    <div style={{
      flex: '0 0 auto',
      width: cardW + 80,
      height: cardH + 80,
      position: 'relative',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexShrink: 0
    }}>
      {stackCards.map((c, i) =>
      <div key={i} style={{
        position: 'absolute',
        width: cardW, height: cardH,
        borderRadius: 28,
        background: c.bg,
        opacity: c.opacity,
        transform: `rotate(${c.rotate}deg) translate(${c.x}px, ${c.y}px)`,
        transformOrigin: 'center bottom',

      padding: '20px 0', userSelect: 'none',

        {items.map((item, i) =>

  const [formData, setFormData] = useState({ name: '', email: '', phone: '', cv: null });
  const [submitted, setSubmitted] = useState(false);
  const [fileName, setFileName] = useState('');

  const handleSubmit = (e) => {
    e.preventDefault();
    setSubmitted(true);

    const data = new FormData();
    data.append('name', formData.name);
    data.append('email', formData.email);
    data.append('phone', formData.phone);
    if (formData.cv) {
      data.append('cv', formData.cv);
    }

    fetch('https://formspree.io/f/wrosario@dreamteam.pe', {
      method: 'POST',
      body: data,
      headers: {
        'Accept': 'application/json'
      }
    }).catch((err) => {

<script>
window.addEventListener('load', function () {
  setTimeout(initScrollAnimations, 500);
});

function initScrollAnimations() {
  if (typeof gsap === 'undefined' || typeof ScrollTrigger === 'undefined') return;
  gsap.registerPlugin(ScrollTrigger);

  gsap.fromTo('[data-anim="ticker"]',
    { opacity: 0, y: 30 },
    { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out',
      scrollTrigger: { trigger: '[data-anim="ticker"]', start: 'top 90%', once: true }
    }
  );

  gsap.fromTo('[data-anim="nosotros-label"]',
    { opacity: 0, y: 20 },
    { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out',
      scrollTrigger: { trigger: '[data-anim="nosotros-label"]', start: 'top 85%', once: true }
    }
  );
  gsap.fromTo('[data-anim="nosotros-grid"]',
    { opacity: 0, y: 40 },
    { opacity: 1, y: 0, duration: 0.9, ease: 'power2.out',
      scrollTrigger: { trigger: '[data-anim="nosotros-grid"]', start: 'top 80%', once: true }
    }
  );

  gsap.fromTo('[data-anim="como-header"]',
    { opacity: 0, y: 36 },
    { opacity: 1, y: 0, duration: 0.9, ease: 'power3.out',
      scrollTrigger: { trigger: '[data-anim="como-header"]', start: 'top 82%', once: true }
    }
  );
  gsap.fromTo('[data-anim="step-card"]',
    { opacity: 0, y: 50 },
    { opacity: 1, y: 0, duration: 0.85, ease: 'power3.out',
      stagger: 0.12,
      scrollTrigger: { trigger: '[data-anim="step-card"]', start: 'top 80%', once: true }
    }
  );

  gsap.fromTo('[data-anim="brands"]',
    { opacity: 0, y: 28 },
    { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out',
      scrollTrigger: { trigger: '[data-anim="brands"]', start: 'top 88%', once: true }

  gsap.fromTo('[data-anim="cta-content"] > *',

      scrollTrigger: { trigger: '[data-anim="footer-col"]', start: 'top 88%', once: true }

  );
}
